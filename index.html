<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="./favicon.png?v=2" type="image/png">
    <link rel="shortcut icon" href="./favicon.png?v=2" type="image/png">

    <title>Impressum</title>
    
    <style>
        :root {
            --bg-color: #010403;
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary-green: #00f5a0; 
            --secondary-green: #00d9f5; 
            --gradient-1: #00f5a01a;
            --gradient-2: #00d9f51a;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
            --blur-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, var(--gradient-1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, var(--gradient-2) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #0c1815 0%, transparent 60%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.8;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border: 1px solid var(--border);
            padding: 60px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 50px 0;
            background: linear-gradient(to right, var(--primary-green), var(--secondary-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--primary-green);
            margin-top: 50px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            letter-spacing: -0.5px;
        }

        h2::before {
            content: "";
            width: 25px;
            height: 2px;
            background: var(--primary-green);
            margin-right: 15px;
            border-radius: 2px;
        }

        .address-box {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid var(--border);
            padding: 35px;
            border-radius: 18px;
            margin: 30px 0;
            font-style: normal;
        }

        .address-box strong {
            color: #ffffff;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 10px;
        }

        .address-box p {
            margin-bottom: 0;
        }

        .address-box p + p {
            margin-top: 15px;
        }

        a {
            color: var(--secondary-green);
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            position: relative;
        }

        a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            bottom: -2px;
            left: 0;
            background: var(--secondary-green);
            transform: scaleX(0);
            transform-origin: bottom right;
            transition: transform 0.3s ease-out;
        }

        a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        a:hover {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 25px;
                border-radius: 18px;
            }
            h1 {
                font-size: 2.2rem;
            }
            body {
                padding: 40px 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Impressum</h1>

    <h2>Angaben gemäß § 5 DDG</h2>
    
    <div class="address-box">
        <p><strong>Kerimcan Stoffregen</strong></p>
        <p>Josefplatz 5<br>
        40227 Düsseldorf<br>
        Deutschland</p>
        <p>E-Mail: <a href="mailto:plave.contact@gmail.com">plave.contact@gmail.com</a></p>
    </div>
</div>

</body>
</html>
